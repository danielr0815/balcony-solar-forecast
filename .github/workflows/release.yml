name: Release

on:
  release:
    types: [published]

jobs:
  validate:
    runs-on: "ubuntu-latest"
    name: Validate for release
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          ignore: "brands"

      - name: Hassfest validation
        uses: "home-assistant/actions/hassfest@master"

      # HACS installs the TAG's zipball (zip_release: false), so the version
      # strings must already be correct IN the tagged commit — bump manifest /
      # pyproject / const.INTEGRATION_VERSION and CHANGELOG.md FIRST, then tag.
      # A post-publish bump commit would only land on main, never in the
      # release, silently shipping the previous version to every installer.
      # This guard fails the release instead.
      - name: Version guard (tag == manifest == pyproject == const)
        run: |
          python - <<'PY'
          import json, os, re, pathlib, sys
          tag = os.environ["GITHUB_REF"].removeprefix("refs/tags/").removeprefix("v")
          mf = json.loads(pathlib.Path(
              "custom_components/balcony_solar_forecast/manifest.json"
          ).read_text())["version"]
          pp = re.search(
              r'^version\s*=\s*"([^"]+)"',
              pathlib.Path("pyproject.toml").read_text(), re.M
          ).group(1)
          const = re.search(
              r'^INTEGRATION_VERSION\s*=\s*"([^"]+)"',
              pathlib.Path(
                  "custom_components/balcony_solar_forecast/const.py"
              ).read_text(), re.M
          ).group(1)
          if not (tag == mf == pp == const):
              sys.exit(
                  f"Release tag v{tag} does not match the tagged commit's "
                  f"version strings (manifest {mf} / pyproject {pp} / const "
                  f"{const}). Bump the versions + CHANGELOG first, then tag."
              )
          print("version OK:", tag)
          PY
