name: Release

on:
  release:
    types: [published]

jobs:
  validate:
    runs-on: "ubuntu-latest"
    name: Validate for release
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          ignore: "brands"

      - name: Hassfest validation
        uses: "home-assistant/actions/hassfest@master"

  release:
    runs-on: "ubuntu-latest"
    needs: validate
    name: Update release info
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: Update version strings
        # Three static version strings are kept equal (enforced by the CI
        # consistency check): the manifest, pyproject, and const.INTEGRATION_VERSION
        # (the device sw_version). Sync all three to the tag.
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" custom_components/balcony_solar_forecast/manifest.json
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/^INTEGRATION_VERSION = \".*\"/INTEGRATION_VERSION = \"$VERSION\"/" custom_components/balcony_solar_forecast/const.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add custom_components/balcony_solar_forecast/manifest.json pyproject.toml custom_components/balcony_solar_forecast/const.py
          git diff --staged --quiet || git commit -m "Update version to ${GITHUB_REF#refs/tags/v}"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
