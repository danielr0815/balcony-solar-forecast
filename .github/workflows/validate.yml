name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    name: HACS Validation
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          ignore: "brands"

  validate-hassfest:
    runs-on: "ubuntu-latest"
    name: Hassfest Validation
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: Hassfest validation
        uses: "home-assistant/actions/hassfest@master"

  lint:
    runs-on: "ubuntu-latest"
    name: Lint (ruff)
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: Set up Python
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      # Lint only (no `ruff format --check`): the code is intentionally
      # hand-formatted (aligned call args, deliberate line breaks), so the
      # project lints but does not enforce the ruff formatter.
      - name: Ruff check
        run: ruff check .

      - name: Version consistency (manifest == pyproject == const)
        run: |
          python - <<'PY'
          import json, re, pathlib
          mf = json.loads(pathlib.Path(
              "custom_components/balcony_solar_forecast/manifest.json"
          ).read_text())["version"]
          pp = re.search(
              r'^version\s*=\s*"([^"]+)"',
              pathlib.Path("pyproject.toml").read_text(), re.M
          ).group(1)
          const = re.search(
              r'^INTEGRATION_VERSION\s*=\s*"([^"]+)"',
              pathlib.Path(
                  "custom_components/balcony_solar_forecast/const.py"
              ).read_text(), re.M
          ).group(1)
          assert mf == pp == const, (
              f"version drift: manifest {mf} / pyproject {pp} / const {const}"
          )
          print("version OK:", mf)
          PY

  tests:
    runs-on: "ubuntu-latest"
    name: Tests (pytest)
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: Set up Python
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant pytest pytest-homeassistant-custom-component pytest-cov

      # Disable the pytest-homeassistant-custom-component plugin (`-p
      # no:homeassistant`). The suite is unit-style: every HA-layer test runs
      # against fakes/monkeypatch and needs only `import homeassistant`, not a
      # real HA instance. PHACC's autouse fixtures (enable_event_loop_debug /
      # verify_cleanup) call asyncio.get_event_loop() at setup, which raises on
      # Python 3.12+ for the sync tests -- so the plugin only breaks a suite that
      # never uses its fixtures. Disabling it runs the full meaningful suite
      # (pytest-asyncio, installed via PHACC, still drives the async tests).
      # Coverage is REPORT-ONLY, never a gate: `--cov-report=term-missing`
      # prints a visible per-file terminal summary (skip-covered trims the
      # fully-covered files) but there is deliberately NO `--cov-fail-under`,
      # so coverage never fails the build — it informs, it does not block.
      - name: Run test suite
        run: >-
          python -m pytest tests -q -p no:homeassistant
          --cov=custom_components/balcony_solar_forecast
          --cov-report=term-missing:skip-covered
