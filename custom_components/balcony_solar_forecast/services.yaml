get_forecast:
  name: Get forecast
  description: >-
    Return the current 15-minute and hourly forecast curves for one or all
    configured sites. When quantile bands are enabled and trained, the response
    additionally carries plane-agnostic total p10/p50/p90 15-minute and hourly
    Wh curves alongside the served (p50-corrected) curve.
  fields:
    entry_id:
      name: Config entry
      description: >-
        Restrict the response to a single config entry. Omit to return every
        configured site.
      example: "1234567890abcdef"
      required: false
      selector:
        text:

import_bootstrap:
  name: Import learner bootstrap
  description: >-
    Ingest a bootstrap JSON produced offline by scripts/backfill.py to pre-seed
    the day-ahead bias and shademap learner states before the first live
    season. The payload is validated and clamped; an unknown schema version is
    rejected and backfilled shademap bins are capped so live data overrides
    them quickly.
  fields:
    entry_id:
      name: Config entry
      description: >-
        Target config entry. Omit only if a single site is configured (the
        service then applies to that one).
      example: "1234567890abcdef"
      required: false
      selector:
        text:
    payload:
      name: Bootstrap JSON
      description: >-
        The bootstrap object inline, either as a JSON object or a JSON string.
        Provide this OR "path", not both.
      required: false
      example: '{"schema_version": 1, "bias_state": {}, "shademap_state": {}}'
      selector:
        object:
    path:
      name: Bootstrap file path
      description: >-
        Absolute path to a bootstrap JSON file readable by Home Assistant (must
        be inside an allowed directory, e.g. /config). Provide this OR
        "payload", not both.
      required: false
      example: "/config/balcony_bootstrap.json"
      selector:
        text:

rollback_learners:
  name: Roll back learner state
  description: >-
    Restore the day-ahead bias and shademap learner states from the nightly
    rollback ring (SPEC §5). Restores state only — the per-layer enable
    switches and any drift auto-disable stay untouched; re-enable a layer in
    the integration options afterwards if needed.
  fields:
    entry_id:
      name: Config entry
      description: >-
        Target config entry. Omit only if a single site is configured.
      example: "1234567890abcdef"
      required: false
      selector:
        text:
    snapshots_back:
      name: Snapshots back
      description: >-
        How many nightly snapshots to go back. 1 restores the newest snapshot
        (last night's pre-training state), higher values go further back.
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 10
          mode: box

dump_shademap:
  name: Dump shademap
  description: >-
    Return the learned shademap as a polar table (sun azimuth x elevation) per
    measurement channel, for visual comparison against known obstructions
    (SPEC §5). Read-only diagnostic; returns a response.
  fields:
    entry_id:
      name: Config entry
      description: >-
        Restrict the dump to a single config entry. Omit to return every
        configured site.
      example: "1234567890abcdef"
      required: false
      selector:
        text:

install_dashboard:
  name: Install observability dashboard
  description: >-
    Write the full observability dashboard — wired to this install's real
    entity ids — into a dashboard you created empty in the UI (Settings →
    Dashboards → Add dashboard, URL "balcony-solar"). Re-run any time to refresh
    it after an integration update. Refuses to overwrite a dashboard it did not
    create unless "overwrite" is set.
  fields:
    entry_id:
      name: Config entry
      description: >-
        Target config entry. Omit only if a single site is configured.
      example: "1234567890abcdef"
      required: false
      selector:
        text:
    dashboard:
      name: Dashboard URL
      description: >-
        The URL path of the (empty) storage-mode dashboard to write into — the
        value in the dashboard's URL field, which must contain a hyphen.
      required: false
      default: balcony-solar
      example: balcony-solar
      selector:
        text:
    overwrite:
      name: Overwrite existing content
      description: >-
        Replace a dashboard that already has content this integration did not
        create. Leave off to protect a hand-authored dashboard; a dashboard this
        action previously wrote is always refreshed without it.
      required: false
      default: false
      selector:
        boolean:

suggest_shade_groups:
  name: Suggest shade groups
  description: >-
    Compare every module's individually-learned shade map bin-by-bin and suggest
    which planes share the same shading, so grouping is data-driven instead of
    eyeballed. Returns a similarity matrix, a grouping proposal and the current
    grouping for comparison (SPEC §5). Read-only diagnostic; returns a response.
  fields:
    entry_id:
      name: Config entry
      description: >-
        Target config entry. Omit only if a single site is configured.
      example: "1234567890abcdef"
      required: false
      selector:
        text:
    max_diff:
      name: Max mean tau difference
      description: >-
        Two planes are treated as sharing shade when their n-weighted mean
        transmittance difference over the bins both learned stays at or below
        this value. Lower is stricter.
      required: false
      default: 0.06
      selector:
        number:
          min: 0.01
          max: 0.5
          step: 0.01
          mode: box
    min_common_bins:
      name: Minimum common bins
      description: >-
        Minimum number of shared sun-position bins two planes must both have
        learned before their similarity counts as evidence; below it the pair is
        reported as insufficient and never grouped.
      required: false
      default: 30
      selector:
        number:
          min: 1
          max: 500
          mode: box

get_shade_profile:
  name: Get shade profile
  description: >-
    Return the sun-path + learned-shade profile (the shade-profile diagram's
    curve arrays) for one module on one local date, without changing the live
    diagram selection. Read-only diagnostic used by the card's comparison-date
    overlay; returns a response (SPEC §15).
  fields:
    entry_id:
      name: Config entry
      description: >-
        Target config entry. Omit only if a single site is configured.
      example: "1234567890abcdef"
      required: false
      selector:
        text:
    module:
      name: Module
      description: >-
        The module/plane to profile. Omit to use the diagram's currently
        selected module.
      example: M2
      required: false
      selector:
        text:
    date:
      name: Date
      description: >-
        The local date to visualise, ISO format YYYY-MM-DD. Omit to use the
        diagram's currently selected date.
      example: "2026-06-21"
      required: false
      selector:
        text:
