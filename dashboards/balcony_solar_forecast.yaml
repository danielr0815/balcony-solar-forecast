# Balcony Solar Forecast — Observability dashboard (SPEC §9/§10/§14.3)
#
# A single Lovelace VIEW that uses ONLY built-in Home Assistant cards
# (markdown, entities, history-graph, statistics-graph, gauge, grid). It works
# on a stock install with ZERO custom cards / HACS frontend resources.
#
# Install: Settings -> Dashboards -> add a new (empty) dashboard, open its
# three-dot menu -> "Edit dashboard" -> three-dot menu -> "Raw configuration
# editor", then paste this file's contents. See docs/DASHBOARD.md for the
# full copy-paste walkthrough and the operator's CONF_COMPARISON_SENSORS
# example. The entity_ids below assume the single reference install
# (device "Balcony Solar Forecast"); adjust the object_id suffixes if your
# entities differ.
#
# The integration's OWN scoreboard sensors (daily_kwh_mae,
# vs_best_baseline_pct, kill_gate_passed) are REGISTERED as soon as v0.4
# is installed; before the first nightly run they read "unknown", which the
# cards render gracefully. TWO groups of ids are the exception and will show
# "Entity not found" until you act:
#   * the per-comparison MAE rows (…_comparison_daily_kwh_mae_<slug>) — those
#     sensors are only CREATED once you configure CONF_COMPARISON_SENSORS
#     (ships EMPTY, D-P9); add your comparisons in the options flow first;
#   * the `sensor.inverter_port_*` rows — OPERATOR-SPECIFIC (see the ">>> EDIT
#     ME <<<" marker further down); replace or delete them on a stock install.

title: Balcony Solar Forecast
views:
  - title: Forecast
    path: forecast
    icon: mdi:solar-power
    cards:
      # ----------------------------------------------------------------
      # Kill-gate verdict (SPEC §9/§10) — the headline the whole plan hangs on.
      # ----------------------------------------------------------------
      - type: markdown
        title: Kill-gate verdict
        content: >
          {% set passed =
          states('binary_sensor.balcony_solar_forecast_kill_gate_passed') %}
          {% set pct =
          states('sensor.balcony_solar_forecast_vs_best_baseline_pct')
          %} {% if passed == 'on' %} ## ✅ Kill-gate PASSED

          The forecast is beating the best configured baseline on daily-kWh MAE
          by the required margin over a full rolling window. It is safe to
          consider re-pointing consumers (e.g. battery_manager) to the forecast
          sensors. {% elif passed == 'off' %} ## ❌ Kill-gate NOT passed

          Over the current full window the forecast is **not** yet the required
          margin better than the best baseline. Keep the frozen baseline in
          place (SPEC §9). {% else %} ## ⏳ Kill-gate: window not full yet

          Not enough scored days in the rolling window to assert the gate
          (`unknown` until a full window of nightly scores exists). {% endif %}

          {% if pct not in ('unknown', 'unavailable') %} Forecast vs best
          baseline: **{{ pct }} %** (positive = forecast better). {% endif %}

      # ----------------------------------------------------------------
      # Forecast-vs-best-baseline gauge (SPEC §9). Positive = forecast better.
      # ----------------------------------------------------------------
      - type: gauge
        name: Forecast vs best baseline
        entity: sensor.balcony_solar_forecast_vs_best_baseline_pct
        unit: "%"
        min: -50
        max: 50
        needle: true
        segments:
          - from: -50
            color: "#c0392b"
          - from: -10
            color: "#e67e22"
          - from: 0
            color: "#f1c40f"
          - from: 10
            color: "#2ecc71"

      # ----------------------------------------------------------------
      # Scoreboard entities: forecast + per-comparison daily-kWh MAE, gate.
      # (SPEC §9/§10). Per-comparison sensors carry a slug of the
      # comparison name; the two shown are the operator's documented pair.
      # ----------------------------------------------------------------
      - type: entities
        title: Skill scoreboard
        show_header_toggle: false
        entities:
          - entity: binary_sensor.balcony_solar_forecast_kill_gate_passed
            name: Kill-gate passed
          - entity: sensor.balcony_solar_forecast_daily_kwh_mae
            name: Forecast daily-kWh MAE
          - entity: sensor.balcony_solar_forecast_hourly_mae
            name: Forecast hourly MAE
          - entity: sensor.balcony_solar_forecast_vs_best_baseline_pct
            name: Forecast vs best baseline
          - type: section
            label: Comparison baselines (daily-kWh MAE)
          - entity: sensor.balcony_solar_forecast_comparison_daily_kwh_mae_8_entry_baseline
            name: 8-Entry Baseline
          - entity: sensor.balcony_solar_forecast_comparison_daily_kwh_mae_alt_1600w
            name: Alt 1600W

      # ----------------------------------------------------------------
      # Forecast vs. measured POWER (SPEC §14.3): a W-vs-W comparison on one
      # y-scale. power_production_now reports AC (the operator-facing standard
      # since Phase 2). The measured row here is the site-total DC power (the
      # integration's own measured_dc_power_total sensor, the live sum of the
      # per-module DC-power entities) — always present when any plane has an
      # actual_entity, so it is the safe generic default. If you configure a
      # TOTAL-AC meter (config flow → "Total-AC meter"), swap the measured row
      # to sensor.balcony_solar_forecast_measured_ac_power for a like-for-like
      # AC-vs-AC comparison and retitle to "(AC power)" — the alternative is in
      # the comment just below. The today-kWh row is gone: mixing kWh and W on
      # one axis is unreadable (the daily-kWh story is in the band card +
      # scoreboard). history-graph is a built-in card.
      # ----------------------------------------------------------------
      - type: history-graph
        title: Forecast vs. measured (DC power)
        hours_to_show: 72
        entities:
          - entity: sensor.balcony_solar_forecast_power_production_now
            name: Forecast
          - entity: sensor.balcony_solar_forecast_measured_dc_power_total
            name: Measured
      # AC-vs-AC alternative (uncomment + delete the DC card above when you have
      # a total-AC meter configured — measured_ac_power is created only then):
      # - type: history-graph
      #   title: Forecast vs. measured (AC power)
      #   hours_to_show: 72
      #   entities:
      #     - entity: sensor.balcony_solar_forecast_power_production_now
      #       name: Forecast
      #     - entity: sensor.balcony_solar_forecast_measured_ac_power
      #       name: Measured

      # ----------------------------------------------------------------
      # DC model & inverter calibration (diagnostic). The main power/energy
      # sensors report AC (Phase 2); these two diagnostics keep the model-
      # internal DC view visible (the DC curve stays the learner/scoreboard
      # truth, SPEC §5). The AC-meter-calibrated inverter efficiency η lives as
      # the "inverter_efficiency_learned" attribute of
      # sensor.balcony_solar_forecast_power_production_now — open its more-info
      # dialog to read the learned eta, folded-sample count and applied value.
      # ----------------------------------------------------------------
      - type: entities
        title: DC model & inverter calibration (diagnostic)
        show_header_toggle: false
        entities:
          - entity: sensor.balcony_solar_forecast_power_production_now_dc
            name: Forecast power now (DC model)
          - entity: sensor.balcony_solar_forecast_energy_production_today_dc
            name: Forecast energy today (DC model)

      # >>> EDIT ME <<< OPERATOR-SPECIFIC entity ids below (this + the next
      # statistics-graph card, and the comparison rows above). The
      # `sensor.inverter_port_*` ids are the REFERENCE install's per-module DC
      # power sensors; on a stock install they do not exist and will read
      # "Entity not found" until you replace them with your own module sensors
      # (or delete these two cards). Everything ABOVE this marker uses the
      # integration's OWN entities and works out of the box.
      #
      # Measured site power = the 8 per-module DC power sensors. A built-in
      # history-graph overlays them so the measured envelope is visible next
      # to the forecast's forecast power. Per SPEC §2 the modules group into
      # planes; grouping is documented in the card names.
      - type: history-graph
        title: Measured DC power per module (ground truth)
        hours_to_show: 48
        entities:
          - entity: sensor.inverter_port_1_dc_power
            name: M1
          - entity: sensor.inverter_port_2_dc_power
            name: M2
          - entity: sensor.inverter_port_1_dc_power_2
            name: M3
          - entity: sensor.inverter_port_2_dc_power_2
            name: M4
          - entity: sensor.inverter_port_1_dc_power_3
            name: M5
          - entity: sensor.inverter_port_2_dc_power_3
            name: M6
          - entity: sensor.inverter_port_1_dc_power_4
            name: M7
          - entity: sensor.inverter_port_2_dc_power_4
            name: M8

      # ----------------------------------------------------------------
      # Per-plane forecast-vs-actual (best-effort with built-in cards).
      # The forecast's per-plane curve is only in the get_forecast service
      # response; on the dashboard we compare the total energy forecast
      # against the measured per-module power grouped by plane (SPEC §2:
      # front 115°, north 25°, south 205°). A statistics-graph gives the daily
      # measured level per module from long-term statistics.
      #
      # NOTE: these are POWER sensors (W, state_class measurement), so the
      # recorder keeps mean/min/max for them and has_sum is false — asking for
      # `sum` here yields no series at all and the card renders empty. `mean`
      # is the stat that actually exists; daily mean W x 24 h is the day's
      # energy, so the bar shape is the same as an energy chart. If your
      # inverter also exposes a per-port total_increasing energy entity (Wh),
      # you can swap the entities for those and use `stat_types: [change]` to
      # get true Wh bars.
      # ----------------------------------------------------------------
      - type: statistics-graph
        title: Measured mean DC power per module (LTS)
        period: day
        stat_types:
          - mean
        chart_type: bar
        days_to_show: 14
        entities:
          - sensor.inverter_port_1_dc_power
          - sensor.inverter_port_2_dc_power
          - sensor.inverter_port_2_dc_power_2
          - sensor.inverter_port_2_dc_power_4

      # ----------------------------------------------------------------
      # Uncertainty band: today's P10 / P50 (state) / P90 (SPEC §6/§14.2).
      # ----------------------------------------------------------------
      - type: entities
        title: Today's forecast band (P10 / P50 / P90)
        show_header_toggle: false
        entities:
          - entity: sensor.balcony_solar_forecast_energy_production_today_p10
            name: P10 (conservative)
          - entity: sensor.balcony_solar_forecast_energy_production_today
            name: P50 (planning)
          - entity: sensor.balcony_solar_forecast_energy_production_today_p90
            name: P90 (optimistic)

      # ----------------------------------------------------------------
      # Learner status + drift MAE + source status (SPEC §5/§7).
      # ----------------------------------------------------------------
      - type: entities
        title: Learners, drift & degradation
        show_header_toggle: false
        entities:
          - entity: sensor.balcony_solar_forecast_source_status
            name: Source status (degradation ladder)
          - entity: binary_sensor.balcony_solar_forecast_degraded
            name: Degraded
          - entity: sensor.balcony_solar_forecast_last_fetch_age
            name: Weather image age
          - type: section
            label: Learners
          - entity: sensor.balcony_solar_forecast_fast_learner_status
            name: Fast (intraday) learner
          - entity: sensor.balcony_solar_forecast_shademap_learner_status
            name: Shademap (slow) learner
          - entity: sensor.balcony_solar_forecast_day_ahead_bias_status
            name: Day-ahead bias
          - entity: sensor.balcony_solar_forecast_intraday_correction_scalar
            name: Intraday scalar (applied)
          - entity: sensor.balcony_solar_forecast_drift_mae_corrected
            name: Drift MAE (corrected vs physics)

      # ----------------------------------------------------------------
      # Drift MAE over time — corrected curve error trend (SPEC §5).
      # ----------------------------------------------------------------
      - type: history-graph
        title: Drift MAE (corrected) trend
        hours_to_show: 168
        entities:
          - entity: sensor.balcony_solar_forecast_drift_mae_corrected
            name: Corrected MAE (Wh)

      # ----------------------------------------------------------------
      # Shademap (SPEC §5/§14.3): best-effort built-in representation.
      # The learned per-channel transmittance polar map is NOT a sensor
      # attribute — it lives in the dump_shademap service response. This
      # markdown card documents how to pull it and reminds the operator of
      # the known obstruction sectors (SPEC §13) to eyeball it against; the
      # learner-status entities above show whether the shademap is active
      # and how many bins it holds.
      # ----------------------------------------------------------------
      - type: markdown
        title: Shademap (learned shade transmittance)
        content: >
          The slow learner holds a per-channel polar map of beam
          transmittance τ over (sun-azimuth × elevation × half-year). It is
          **not** a sensor attribute — pull the full polar table with the
          built-in service:


          **Developer Tools → Actions →** `balcony_solar_forecast.dump_shademap`
          (enable *"Return response"*). Each channel returns bins of
          `{az_deg, el_deg, tau, n}`; a richer polar plot can be rendered
          offline from that JSON.


          Eyeball the learned τ against the known obstructions (SPEC §13):

          - **East hill** — reduced τ at low elevation, sun-azimuth ~60–100°
            (morning), all channels.

          - **Building wall** — τ → 0 above the edge for the **south** modules
            M4/M8 at sun-azimuth ~205–218° (early afternoon beam collapse).

          - **Trees** (seasonal) — reduced τ on M4 (strong) / M8 (weak) at
            sun-azimuth ~135–175°, elevation ~30–45°; lower in leaf.


          Shademap status and bin count are in the *Learners, drift &
          degradation* card above.

      # ----------------------------------------------------------------
      # Shade profile (sun path vs learned shading) — SPEC §5. The controls
      # and the shaded-fraction headline are built-in; the full per-date
      # diagram needs the HACS apexcharts-card (separate snippet
      # dashboards/shade_profile_apexcharts.yaml + docs/DASHBOARD.md).
      # ----------------------------------------------------------------
      - type: entities
        title: Shade profile (per date & module)
        show_header_toggle: false
        entities:
          - entity: select.balcony_solar_forecast_shade_profile_module
            name: Module
          - entity: date.balcony_solar_forecast_shade_profile_date
            name: Date
          - entity: sensor.balcony_solar_forecast_shade_profile
            name: Shaded fraction of daylight
      - type: markdown
        title: Shade profile diagram
        content: >
          Pick a **module** and a **date** above; the *Shaded fraction of
          daylight* sensor then reports how much of that day's sunlight the
          currently-learned shading blocks for that module.


          The full **sun-path-vs-shading diagram** (sun elevation over azimuth,
          coloured by the learned transmittance τ, with the learned and static
          horizon lines) needs the HACS **`apexcharts-card`** — it is the one
          card a built-in Lovelace card cannot draw. Paste
          `dashboards/shade_profile_apexcharts.yaml` as a Manual card after
          installing it. The curve arrays live in the
          `sensor.balcony_solar_forecast_shade_profile` **attributes**
          (`azimuth`, `sun_elevation`, `transmittance`, `shade_horizon`,
          `static_horizon`). See docs/DASHBOARD.md.

      # ----------------------------------------------------------------
      # Comparison-sensor configuration reminder (D-P9: shipped EMPTY).
      # ----------------------------------------------------------------
      - type: markdown
        title: Scoreboard comparison sensors
        content: >
          The scoreboard ships with **no** comparison baselines configured
          (generic, not hardcoded — D-P9). Add them in **Settings →
          Devices & Services → Balcony Solar Forecast → Configure →
          Comparison sensors**. The operator's live site uses:


          | Name | Daily-kWh entity |

          |---|---|

          | `8-Entry Baseline` | `sensor.pv_prognose_heute_alle_module` |

          | `Alt 1600W` | `sensor.energy_production_today_4` |


          Each added comparison creates a
          `…_comparison_daily_kwh_mae_<slug>` sensor. See docs/DASHBOARD.md.
